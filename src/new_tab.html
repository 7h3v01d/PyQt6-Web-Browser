<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --obsidian: #0b0f14;
    --panel:    #0e141b;
    --panel-2:  #080b0f;
    --input:    #11171f;
    --border:   #1c2733;
    --steel:    #253341;
    --teal:     #2fd6c3;
    --amber:    #ffb454;
    --phosphor: #4be08a;
    --red:      #ff5c66;
    --text:     #e6edf3;
    --dim:      #7d8b99;
    --muted:    #4d5b68;
    --mono: 'JetBrains Mono', 'Cascadia Mono', Consolas, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--obsidian);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* top accent rail — echoes the splash screen */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--teal), var(--phosphor) 45%, var(--border) 45%, var(--border));
    pointer-events: none;
    z-index: 10;
  }

  /* teal bloom behind the clock */
  body::after {
    content: '';
    position: fixed;
    top: -140px; left: 50%;
    width: 900px; height: 420px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(47,214,195,0.07), transparent 65%);
    pointer-events: none;
  }

  /* ── Brand bar ─────────────────────────────────────────── */
  #brand-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    pointer-events: none;
    z-index: 9;
  }
  #brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #brand img {
    width: 22px; height: 22px;
    filter: drop-shadow(0 0 6px rgba(47,214,195,0.25));
  }
  #brand .wordmark {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
  }
  #brand .wordmark b { color: var(--teal); font-weight: 700; }
  #brand .sub {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-top: 3px;
  }
  #brand-meta {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
  }
  #brand-meta .chip {
    border: 1px solid var(--border);
    padding: 3px 8px;
    margin-left: 6px;
    color: var(--dim);
  }
  #brand-meta .chip.live { color: var(--phosphor); border-color: var(--steel); }

  /* viewport corner brackets — splash-screen signature */
  .vcorner {
    position: fixed;
    width: 14px; height: 14px;
    pointer-events: none;
    z-index: 9;
  }
  .vcorner.tl { top: 54px;    left: 14px;   border-left: 1px solid var(--amber); border-top: 1px solid var(--amber); }
  .vcorner.tr { top: 54px;    right: 14px;  border-right: 1px solid var(--amber); border-top: 1px solid var(--amber); }
  .vcorner.bl { bottom: 42px; left: 14px;   border-left: 1px solid var(--amber); border-bottom: 1px solid var(--amber); }
  .vcorner.br { bottom: 42px; right: 14px;  border-right: 1px solid var(--amber); border-bottom: 1px solid var(--amber); }

  ::selection { background: var(--teal); color: #05201c; }

  /* ── Clock ─────────────────────────────────────────────── */
  #clock-section {
    margin-top: 86px;
    position: relative;
    text-align: center;
  }

  #clock {
    font-size: 76px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  #clock .secs { color: var(--teal); }

  #greeting {
    font-size: 13px;
    font-weight: 400;
    color: var(--dim);
    margin-top: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #greeting .sep { color: var(--amber); }
  #date { display: none; }  /* folded into greeting line */

  /* ── Search bar ────────────────────────────────────────── */
  #search-section {
    margin-top: 34px;
    width: 100%;
    max-width: 520px;
    padding: 0 16px;
  }

  #search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  #search-icon {
    position: absolute;
    left: 16px;
    color: var(--amber);
    font-size: 15px;
    pointer-events: none;
  }

  #search-bar {
    width: 100%;
    padding: 13px 16px 13px 42px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.5px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  #search-bar::placeholder { color: var(--muted); letter-spacing: 1px; }
  #search-bar:focus { border-color: var(--teal); background: var(--input); }

  /* ── Speed dial ────────────────────────────────────────── */
  #speed-dial-section {
    margin-top: 44px;
    width: 100%;
    max-width: 760px;
    padding: 0 24px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .section-rule {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  #add-site-btn {
    background: none;
    border: none;
    color: var(--teal);
    padding: 2px 4px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
  }
  #add-site-btn:hover { color: var(--phosphor); }

  #speed-dial-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }

  .dial-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 10px 15px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
    gap: 11px;
    min-height: 100px;
    justify-content: center;
  }

  /* corner brackets — muted at rest, teal on hover */
  .dial-card::before,
  .dial-card::after {
    content: '';
    position: absolute;
    width: 9px; height: 9px;
    border-color: var(--steel);
    transition: border-color 0.15s;
  }
  .dial-card::before { top: 5px; left: 5px; border-left: 1px solid var(--steel); border-top: 1px solid var(--steel); }
  .dial-card::after  { bottom: 5px; right: 5px; border-right: 1px solid var(--steel); border-bottom: 1px solid var(--steel); }

  .dial-card:hover {
    background: var(--input);
    border-color: var(--teal);
    transform: translateY(-2px);
  }
  .dial-card:hover::before { border-left-color: var(--teal); border-top-color: var(--teal); }
  .dial-card:hover::after  { border-right-color: var(--teal); border-bottom-color: var(--teal); }

  .dial-card .favicon {
    width: 38px;
    height: 38px;
    object-fit: contain;
    background: var(--obsidian);
    border: 1px solid var(--border);
    padding: 5px;
    transition: border-color 0.15s;
  }
  .dial-card .favicon.mono { padding: 0; border-color: var(--steel); }
  .dial-card:hover .favicon { border-color: var(--teal); }

  .dial-card .site-name {
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--dim);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }
  .dial-card:hover .site-name { color: var(--text); }

  .dial-card .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 16px;
    height: 16px;
    border-radius: 0;
    background: var(--panel-2);
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 2;
  }
  .dial-card:hover .remove-btn { display: flex; }
  .dial-card .remove-btn:hover { background: var(--red); color: var(--obsidian); }

  .dial-add-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 10px;
    background: var(--panel-2);
    border: 1px dashed var(--steel);
    border-radius: 0;
    cursor: pointer;
    color: var(--muted);
    font-size: 22px;
    transition: all 0.15s;
    min-height: 100px;
    gap: 6px;
  }
  .dial-add-card:hover { border-color: var(--teal); color: var(--teal); }
  .dial-add-card span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

  /* ── Footer readout ────────────────────────────────────── */
  #hud-footer {
    margin-top: auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
  }
  #hud-footer .ok { color: var(--phosphor); }
  #hud-footer .amber { color: var(--amber); }

  /* ── Modal ─────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(3,5,8,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--steel);
    border-radius: 0;
    padding: 26px;
    width: 380px;
  }
  .modal h3 {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    color: var(--teal);
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .modal input {
    width: 100%;
    padding: 10px 12px;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--teal); }
  .modal input::placeholder { color: var(--muted); }

  .modal-buttons { display: flex; gap: 10px; margin-top: 8px; }

  .btn-primary {
    flex: 1;
    padding: 10px;
    background: var(--teal);
    border: none;
    border-radius: 0;
    color: #05201c;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--phosphor); }

  .btn-secondary {
    flex: 1;
    padding: 10px;
    background: var(--panel-2);
    border: 1px solid var(--steel);
    border-radius: 0;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--teal); color: var(--text); }
</style>
</head>

    <div>
      <div class="wordmark">BLACK<b>LINE</b></div>
      <div class="sub">BROWSER</div>
    </div>
  </div>
  <div id="brand-meta">
    v1.0<span class="chip">NEW TAB</span><span class="chip live" id="net-chip">ONLINE</span>
  </div>
</div>
<div class="vcorner tl"></div><div class="vcorner tr"></div>
<div class="vcorner bl"></div><div class="vcorner br"></div>

<section id="clock-section">
  <div id="clock">00:00<span class="secs">:00</span></div>
  <div id="greeting">Good evening</div>
  <div id="date">Loading...</div>
</section>

<section id="search-section">
  <div id="search-wrap">
    <span id="search-icon">&#9906;</span>
    <input id="search-bar" type="text" placeholder="Search or enter URL" autofocus />
  </div>
</section>

<section id="speed-dial-section">
  <div class="section-header">
    <span class="section-title">Speed Dial</span>
    <div class="section-rule"></div>
    <button id="add-site-btn">+ Add</button>
  </div>
  <div id="speed-dial-grid"></div>
</section>

<div id="hud-footer">
  <span><span class="ok">&#9679;</span> CONNECTION SECURE</span>
  <span id="hud-date" class="amber">--</span>
  <span><span id="hud-count">0</span> TILES</span>
</div>

<!-- Add site modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>// Add to Speed Dial</h3>
    <input id="modal-name" type="text" placeholder="Name (e.g. YouTube)" />
    <input id="modal-url" type="text" placeholder="URL (e.g. https://youtube.com)" />
    <div class="modal-buttons">
      <button class="btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-add">Add</button>
    </div>
  </div>
</div>

<script>
// ── Clock ──────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').innerHTML = `${h}:${m}<span class="secs">:${s}</span>`;

  const hour = now.getHours();
  let g = 'Good evening';
  if (hour < 12) g = 'Good morning';
  else if (hour < 17) g = 'Good afternoon';

  const opts = { weekday: 'short', day: '2-digit', month: 'short' };
  const dateStr = now.toLocaleDateString(undefined, opts).toUpperCase();
  document.getElementById('greeting').innerHTML =
    `${g}<span class="sep"> // </span>${dateStr}`;
  const hd = document.getElementById('hud-date');
  if (hd) hd.textContent = dateStr;
}
updateClock();
setInterval(updateClock, 1000);

// ── Speed Dial ─────────────────────────────────────────────────
const DEFAULT_SITES = [
  { name: 'Google',   url: 'https://google.com' },
  { name: 'YouTube',  url: 'https://youtube.com' },
  { name: 'Reddit',   url: 'https://reddit.com' },
  { name: 'GitHub',   url: 'https://github.com' },
  { name: 'Netflix',  url: 'https://netflix.com' },
  { name: 'Steam',    url: 'https://store.steampowered.com' },
];

function loadSites() {
  try {
    const saved = localStorage.getItem('speedDial');
    return saved ? JSON.parse(saved) : DEFAULT_SITES;
  } catch { return DEFAULT_SITES; }
}

function saveSites(sites) {
  try { localStorage.setItem('speedDial', JSON.stringify(sites)); } catch {}
}

// Favicons: try several providers, then the site itself, then fall back to a
// locally generated monogram. A tile never renders empty.
function faviconSources(url) {
  try {
    const u = new URL(url);
    const d = u.hostname;
    return [
      `https://icons.duckduckgo.com/ip3/${d}.ico`,
      `https://www.google.com/s2/favicons?domain=${d}&sz=64`,
      `${u.protocol}//${d}/favicon.ico`,
    ];
  } catch { return []; }
}

function monogramIcon(name, url) {
  let ch = (name || '').trim().charAt(0);
  if (!ch) { try { ch = new URL(url).hostname.replace(/^www\./, '').charAt(0); } catch { ch = '?'; } }
  ch = ch.toUpperCase();
  const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">` +
    `<rect width="64" height="64" fill="#11171f"/>` +
    `<rect x="0.5" y="0.5" width="63" height="63" fill="none" stroke="#253341"/>` +
    `<text x="32" y="44" text-anchor="middle" fill="#2fd6c3" font-size="32" font-weight="700" ` +
    `font-family="JetBrains Mono,Consolas,monospace">${ch}</text></svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function attachFavicon(img, site) {
  const chain = faviconSources(site.url);
  let i = 0;
  img.addEventListener('error', () => {
    if (i < chain.length) { img.src = chain[i++]; }
    else { img.classList.add('mono'); img.src = monogramIcon(site.name, site.url); }
  });
  img.src = chain.length ? chain[i++] : monogramIcon(site.name, site.url);
}

function renderDial() {
  const sites = loadSites();
  const grid = document.getElementById('speed-dial-grid');
  grid.innerHTML = '';

  sites.forEach((site, i) => {
    const a = document.createElement('a');
    a.className = 'dial-card';
    a.href = site.url;
    a.title = site.url;

    const img = document.createElement('img');
    img.className = 'favicon';
    img.alt = '';
    attachFavicon(img, site);

    const name = document.createElement('span');
    name.className = 'site-name';
    name.textContent = site.name;

    const rm = document.createElement('button');
    rm.className = 'remove-btn';
    rm.textContent = '\u00d7';
    rm.title = 'Remove';
    rm.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const s = loadSites();
      s.splice(i, 1);
      saveSites(s);
      renderDial();
    });

    a.appendChild(img);
    a.appendChild(name);
    a.appendChild(rm);
    grid.appendChild(a);
  });

  // Add placeholder card
  const addCard = document.createElement('div');
  addCard.className = 'dial-add-card';
  addCard.innerHTML = '+<span>Add site</span>';
  addCard.addEventListener('click', openModal);
  grid.appendChild(addCard);

  const hc = document.getElementById('hud-count');
  if (hc) hc.textContent = sites.length;
}

// ── Modal ──────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-name').focus();
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('open');
});

document.getElementById('modal-add').addEventListener('click', () => {
  let name = document.getElementById('modal-name').value.trim();
  let url = document.getElementById('modal-url').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  if (!name) { try { name = new URL(url).hostname; } catch { name = url; } }
  const sites = loadSites();
  sites.push({ name, url });
  saveSites(sites);
  renderDial();
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-url').value = '';
});

document.getElementById('add-site-btn').addEventListener('click', openModal);

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── Search ─────────────────────────────────────────────────────
document.getElementById('search-bar').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  let val = e.target.value.trim();
  if (!val) return;
  if (val.match(/^https?:\/\//) || val.match(/^[\w-]+\.[a-z]{2,}/i)) {
    if (!val.startsWith('http')) val = 'https://' + val;
    window.location.href = val;
  } else {
    window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(val);
  }
});

// ── Network chip ───────────────────────────────────────────────
function updateNetChip() {
  const chip = document.getElementById('net-chip');
  if (!chip) return;
  const on = navigator.onLine;
  chip.textContent = on ? 'ONLINE' : 'OFFLINE';
  chip.style.color = on ? 'var(--phosphor)' : 'var(--red)';
}
window.addEventListener('online', updateNetChip);
window.addEventListener('offline', updateNetChip);
updateNetChip();

// ── Init ───────────────────────────────────────────────────────
renderDial();
</script>
</body>
</html>
